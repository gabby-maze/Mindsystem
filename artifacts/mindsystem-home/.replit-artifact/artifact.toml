kind = "web"
previewPath = "/"
title = "MindSystem Home"
version = "1.0.0"
id = "artifacts/mindsystem-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23364

[services.development]
run = "pnpm --filter @workspace/mindsystem-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindsystem-home", "run", "build" ]
publicDir = "artifacts/mindsystem-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23364"
BASE_PATH = "/"
